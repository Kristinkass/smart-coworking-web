{% extends "base.html" %}

{% block title %}Регистрация - Умный Коворкинг{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
            <p>Создайте новый аккаунт</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Почта *</label>
                <input type="email" id="email" name="email" required 
                       placeholder="ваш@email.com" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя *</label>
                <input type="text" id="username" name="username" required 
                       placeholder="Ваше имя" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="phone"><i class="fas fa-phone"></i> Телефон</label>
                <input type="tel" id="phone" name="phone" class="form-control phone-mask"
                       placeholder="+7 999 123 45 67">
            </div>


            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль *</label>
                <input type="password" id="password" name="password" required
                       placeholder="Минимум 6 символов" class="form-control">
                <small class="form-text">Пароль должен содержать не менее 6 символов</small>
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Подтвердите пароль *</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Повторите пароль" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>

            <div class="auth-links">
                <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.auth-form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const phoneInput = document.getElementById('phone');

    if (typeof initPhoneMasks === 'function') initPhoneMasks();

    form.addEventListener('submit', function(e) {
        if (password.value !== confirmPassword.value) {
            e.preventDefault();
            showToast('Пароли не совпадают!', 'warning');
            confirmPassword.focus();
            return false;
        }

        if (password.value.length < 6) {
            e.preventDefault();
            showToast('Пароль должен содержать не менее 6 символов!', 'warning');
            password.focus();
            return false;
        }

        const email = document.getElementById('email').value.trim();
        if (!email.includes('@') || !email.split('@')[1]?.includes('.')) {
            e.preventDefault();
            showToast('Введите корректный email (должен содержать @ и домен)', 'warning');
            document.getElementById('email').focus();
            return false;
        }

        if (phoneInput.value && typeof isPhoneComplete === 'function' && !isPhoneComplete(phoneInput.value)) {
            e.preventDefault();
            showToast('Введите корректный номер телефона', 'warning');
            phoneInput.focus();
            return false;
        }
    });
});
</script>
{% endblock %}
