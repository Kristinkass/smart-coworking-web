{% extends "base.html" %}

{% block title %}Смена пароля - Умный Коворкинг{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1><i class="fas fa-key"></i> Смена пароля</h1>
            <p>Введите текущий и новый пароль.</p>
        </div>

        <form id="change-pw-form" class="auth-form">
            <div class="form-group">
                <label for="current_password"><i class="fas fa-lock"></i> Текущий пароль</label>
                <input type="password" id="current_password" name="current_password" required
                       placeholder="Введите текущий пароль" class="form-control">
            </div>

            <div class="form-group">
                <label for="new_password"><i class="fas fa-key"></i> Новый пароль</label>
                <input type="password" id="new_password" name="new_password" required minlength="6"
                       placeholder="Минимум 6 символов" class="form-control">
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-key"></i> Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Повторите новый пароль" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-save"></i> Сохранить
            </button>
        </form>
    </div>
</div>

<script>
document.getElementById('change-pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const current = document.getElementById('current_password').value;
    const newPw = document.getElementById('new_password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (newPw !== confirm) {
        showToast('Пароли не совпадают', 'warning');
        return;
    }
    if (newPw.length < 6) {
        showToast('Пароль должен быть не менее 6 символов', 'warning');
        return;
    }

    const r = await fetch('/api/change_password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ current_password: current, new_password: newPw })
    });
    const d = await r.json();
    if (d.success) {
        showToast('Пароль успешно изменён', 'success');
        window.location.href = '/dashboard';
    } else {
        showToast(d.error || 'Ошибка', 'error');
    }
});
</script>
{% endblock %}
